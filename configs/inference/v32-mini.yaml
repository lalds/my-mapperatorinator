defaults:
  - default
  - ../train@train: v32-mini
  - ../diffusion@diffusion: v1
  - _self_

model_path: 'OliBomby/Mapperatorinator-v32-mini'  # Path to trained model
diff_ckpt: 'OliBomby/osu-diffusion-v2'
version: 'Mapperatorinator V32-mini'
in_context: []
output_type: [TIMING, MAP, SV]    # Output type (map, timing)
temperature: 0.9        # Sampling temperature
top_p: 0.9              # Top-p sampling threshold
max_batch_size: 32       # Maximum batch size for inference
generate_positions: false
snap_near_perfect_overlaps: false